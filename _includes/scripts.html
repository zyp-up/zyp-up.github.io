<script type="module" src="{{ base_path }}/assets/js/main.min.js"></script>

<script>
	window.PAGE_VIEWS_CONFIG = {
		provider: "{{ site.page_views.provider | default: 'counterapi' }}",
		namespace: "{{ site.page_views.namespace | default: 'zypup_blog_pv' }}",
		counterapi_endpoint: "{{ site.page_views.counterapi_endpoint | default: 'https://api.counterapi.dev/v1' }}",
		worker_endpoint: "{{ site.page_views.worker_endpoint | default: '' }}",
		backup_worker_endpoint: "{{ site.page_views.backup_worker_endpoint | default: '' }}",
		timeout_ms: "{{ site.page_views.timeout_ms | default: 5000 }}"
	};
</script>
<script src="{{ base_path }}/assets/js/page-views.js"></script>

<script>
	(function () {
		// Improve perceived performance for content images without changing markdown files.
		var selectors = [
			'.page__content img',
			'.archive img',
			'.blog-posts-scroll img',
			'.education-card img',
			'.internship-entry img'
		];

		var images = document.querySelectorAll(selectors.join(','));

		images.forEach(function (img, index) {
			// Keep avatar/logo-like images eager only if explicitly marked high priority.
			var isHighPriority = img.getAttribute('fetchpriority') === 'high';

			if (!isHighPriority && !img.hasAttribute('loading')) {
				img.setAttribute('loading', index === 0 ? 'eager' : 'lazy');
			}

			if (!img.hasAttribute('decoding')) {
				img.setAttribute('decoding', 'async');
			}

			if (!isHighPriority && !img.hasAttribute('fetchpriority')) {
				img.setAttribute('fetchpriority', index === 0 ? 'high' : 'low');
			}

			// If dimensions are missing, set them after load to reduce repeated relayout.
			if ((!img.hasAttribute('width') || !img.hasAttribute('height')) && img.complete) {
				if (!img.hasAttribute('width') && img.naturalWidth) {
					img.setAttribute('width', String(img.naturalWidth));
				}
				if (!img.hasAttribute('height') && img.naturalHeight) {
					img.setAttribute('height', String(img.naturalHeight));
				}
			} else if (!img.complete) {
				img.addEventListener('load', function () {
					if (!img.hasAttribute('width') && img.naturalWidth) {
						img.setAttribute('width', String(img.naturalWidth));
					}
					if (!img.hasAttribute('height') && img.naturalHeight) {
						img.setAttribute('height', String(img.naturalHeight));
					}
				}, { once: true });
			}
		});
	})();
</script>
