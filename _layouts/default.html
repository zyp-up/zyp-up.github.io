---
layout: compress
---

{% include base_path %}

<!doctype html>
<html lang="{{ site.locale | slice: 0,2 }}" class="no-js"{% if site.site_theme == "dark" %} data-theme="dark"{% endif %}>
  <head>
    {% include head.html %}
    {% include head/custom.html %}
  </head>

  <body>

    {% include browser-upgrade.html %}
    {% include masthead.html %}

    {{ content }}

    <div class="page__footer">
      <footer>
        {% include footer/custom.html %}
        {% include footer.html %}
      </footer>
    </div>

    {% include scripts.html %}

    <script>
      // 自动化实时浏览量统计脚本 (基于公共接口 counterapi.dev)
      document.addEventListener("DOMContentLoaded", function() {
        var namespace = "zypup_blog_pv";
        
        // 1. 如果当前处于文章详情页，发送 /up 请求增加浏览量
        {% if page.url contains '/posts/' or page.layout == 'single' %}
        var pageKey = "{{ page.url | slugify }}";
        if (pageKey) {
          fetch("https://api.counterapi.dev/v1/" + namespace + "/" + pageKey + "/up").catch(function(e){});
        }
        {% endif %}
        
        // 2. 如果页面有展示卡片，发送获取请求
        var counters = document.querySelectorAll('.counter-view-span');
        if (counters.length > 0) {
          counters.forEach(function(el) {
            var key = el.getAttribute('data-key');
            if (key) {
              fetch("https://api.counterapi.dev/v1/" + namespace + "/" + key)
                .then(function(res) {
                  if (!res.ok) { return { count: 0 }; }
                  return res.json();
                })
                .then(function(data) {
                  el.innerHTML = typeof data.count === 'number' ? data.count : 0;
                })
                .catch(function(err) {
                  el.innerHTML = 0;
                });
            }
          });
        }
      });
    </script>

  </body>
</html>
